<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <title>빽투더퓨처 무근성 시즌2</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script type="text/javascript" src="./scripts/soundHandler.js"></script>
  <script>
    AFRAME.registerComponent('video-handler', {
      init: function () {
        var marker = this.el;
        this.vid = document.querySelector('#vid07');

        marker.addEventListener('markerFound', function () {
          this.vid.play();
        }.bind(this));

        marker.addEventListener('markerLost', function () {
          this.vid.pause();
        }.bind(this));
      }
    });
  </script>
</head>

<body style="margin: 0; overflow: hidden">
  <a-scene embedded arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_9_3; debugUIEnabled: false; trackingMethod: best; smooth: true; smoothCount: 10; smoothTolerance: 0.01; smoothThreshold: 5;">
    
    <a-assets>
      <img id="img01" src="./assets/1.png" />
      <img id="img02" src="./assets/2.png" />  
      <img id="img03" src="./assets/3.png" />    
      <img id="img04" src="./assets/4.png" />
      <img id="img05" src="./assets/5.png" />
      <img id="img06" src="./assets/6.png" />
      <video id="vid07" src="./assets/7.mp4" preload="auto" loop="true" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
    </a-assets> <a-marker type="barcode" value="1">
      <a-image src="#img01" position="0 0.1 0" rotation="-90 0 0" scale="2 1.5 1" material="shader: flat;"></a-image>
    </a-marker>

    <a-marker type="barcode" value="2">
      <a-image src="#img02" position="0 0.1 0" rotation="-90 0 0" scale="2 1.5 1" material="shader: flat;"></a-image>
    </a-marker>

    <a-marker type="barcode" value="3">
      <a-image src="#img03" position="0 0.1 0" rotation="-90 0 0" scale="2 1.5 1" material="shader: flat;"></a-image>
    </a-marker>

    <a-marker type="barcode" value="4">
      <a-image src="#img04" position="0 0.1 0" rotation="-90 0 0" scale="2 1.5 1" material="shader: flat;"></a-image>
    </a-marker>

    <a-marker type="barcode" value="5">
      <a-image src="#img05" position="0 0.1 0" rotation="-90 0 0" scale="2 1.5 1" material="shader: flat;"></a-image>
    </a-marker>

    <a-marker type="barcode" value="6">
      <a-image src="#img06" position="0 0.1 0" rotation="-90 0 0" scale="2 1.5 1" material="shader: flat;"></a-image>
    </a-marker>

    <a-marker type="barcode" value="7" video-handler>
      <a-video src="#vid07" position="0 0.05 0" rotation="-90 0 0" scale="2 1.5 1" material="shader: flat;"></a-video>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>

</html>
